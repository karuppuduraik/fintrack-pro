version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fintrack-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fintrack_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./fintrack-backend
      dockerfile: Dockerfile
    container_name: fintrack-spring-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=fintrack_db
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      - db

  frontend:
    build:
      context: ./fintrack-frontend
      dockerfile: Dockerfile
    container_name: fintrack-react-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
